data:
  train_files: /path/to/your/data/train_data
  val_files: /path/to/your/data/test_data
  prompt_key: prompt
  answer_key: gt
  image_key: image_paths
  video_key: videos
  image_dir: /path/to/your/data/test_data
  image_train_dir: /path/to/your/data/train_data
  video_fps: 2.0
  # max_prompt_length: 2048
  max_prompt_length: 7168 # modified
  # max_response_length: 2048
  max_response_length: 1024  # modified
  # rollout_batch_size: 512  # equivalent to verl's data.train_batch_size
  rollout_batch_size: 16 # Must be divisible by the number of GPUs.
  mini_rollout_batch_size: null  # equivalent to verl's data.gen_batch_size
  # val_batch_size: 1024
  val_batch_size: 16  # modified
  format_prompt: ./examples/format_prompt/urst.jinja
  override_chat_template: null
  shuffle: true
  seed: 42
  min_pixels: 262144
  # max_pixels: 4194304
  max_pixels: 802816 #modified
  filter_overlong_prompts: true

algorithm:
  adv_estimator: sgpo
  disable_kl: false
  use_kl_loss: true  # 选择kl penalty的方式
  kl_penalty: low_var_kl
  # kl_coef: 1.0e-2
  kl_coef: 1.0e-3 # modified
  online_filtering: false  # dapo filter groups
  filter_key: overall
  # Note: online_filtering is set to False in config.py, so this is effectively disabled.
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    # global_batch_size: 128  # equivalent to verl's actor.ppo_mini_batch_size
    global_batch_size: 16  # equivalent to verl's actor.ppo_mini_batch_size. Must be equal to rollout_batch_size.
    # micro_batch_size_per_device_for_update: 1  # equivalent to verl's actor.ppo_micro_batch_size_per_gpu
    micro_batch_size_per_device_for_update: 1 ##modified  # equivalent to verl's actor.ppo_micro_batch_size_per_gpu
    micro_batch_size_per_device_for_experience: 1  # equivalent to verl's rollout.log_prob_micro_batch_size_per_gpu
    ppo_epochs: 4  # modified
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 1
    model:
      model_path: /your/path/to/checkpoint/saves/easy_r1/experiment_name/SFT_models/round_init
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false

    optim:
      lr: 1.0e-6
      # weight_decay: 1.0e-2
      weight_decay: 1.0e-1 # modified
      strategy: adamw  # {adamw, adamw_bf16}
      # lr_warmup_ratio: 0.0
      lr_warmup_ratio: 0.05 #modified
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true  # true: more CPU memory; false: more GPU memory
      offload_optimizer: true  # true: more CPU memory; false: more GPU memory

  rollout:
    # n: 5
    n: 8  # modified
    temperature: 1.0
    #top_p: 1.0
    top_p: 0.9 #modified
    limit_images: 2
    gpu_memory_utilization: 0.6
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 2
    disable_tqdm: false
    # uncertainty sample和final evaluate时的config
    val_override_config:
      temperature: 1.0
      top_p: 0.9
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true  # true: more CPU memory; false: more GPU memory
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_type: batch
    # Reward for binary YES/NO classification; parses <answer> tags.
    reward_function: ./examples/reward_function/yes_no.py:compute_score

trainer:
  # total_epochs: 4
  total_epochs: 4  # modified
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen2_5_vl_3b_urst_sgpo
  logger: ["console", "wandb"]
  nnodes: 1
  # n_gpus_per_node: 8
  n_gpus_per_node: 8  # modified
  max_try_make_batch: 20  # -1 means no limit
  # val_freq: 5  # -1 to disable
  val_freq: -1 #modified # -1 to disable
  val_before_train: true
  val_only: false
  val_generations_to_log: 3
  # save_freq: 5  # -1 to disable
  save_freq: 1000 #modified # -1 to disable
  # save_limit: 3  # -1 to disable
  save_limit: 2  #modified # -1 to disable
  save_model_only: false
  # TODO: Update path
  save_checkpoint_path: /path/to/your/saves/easy_r1/experiment_name/SGPO_models_v4
  load_checkpoint_path: /path/to/your/saves/easy_r1/experiment_name/SFT_models/round_init
  find_last_checkpoint: true

